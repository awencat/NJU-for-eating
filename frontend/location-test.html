<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .result-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }
        
        .result-item {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .result-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .result-value {
            color: #333;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }
        
        .accuracy-good {
            color: #2ecc71;
        }
        
        .accuracy-medium {
            color: #f39c12;
        }
        
        .accuracy-poor {
            color: #e74c3c;
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        
        .status-info {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status-warning {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .status-error {
            background: #ffebee;
            color: #c62828;
        }
        
        .map-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .map-link:hover {
            text-decoration: underline;
        }
        
        .history {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            border: 1px solid #e0e0e0;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .loading i {
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 定位测试工具</h1>
        <p class="subtitle">用于诊断浏览器定位功能的准确性</p>
        
        <div id="status"></div>
        
        <div class="btn-group">
            <button class="btn-primary" onclick="testLocation()">
                🔍 开始定位
            </button>
            <button class="btn-secondary" onclick="clearHistory()">
                🗑️ 清除历史
            </button>
        </div>
        
        <div id="result"></div>
        
        <div class="history" id="history">
            <h3 style="margin-bottom: 10px; color: #333; font-size: 1rem;">📊 定位历史</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let history = [];
        
        function testLocation() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            
            statusDiv.className = 'status status-info';
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在获取位置，请稍候...';
            resultDiv.innerHTML = '';
            
            if (!navigator.geolocation) {
                showStatus('您的浏览器不支持地理定位功能', 'error');
                return;
            }
            
            console.log('开始高精度定位测试...');
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude, accuracy, altitude, heading, speed } = position.coords;
                    const timestamp = new Date().toLocaleString('zh-CN');
                    
                    console.log(`定位成功: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`);
                    console.log(`精度: ${accuracy.toFixed(0)}米`);
                    
                    // 判断精度等级
                    let accuracyClass = 'accuracy-good';
                    let accuracyText = '优秀';
                    if (accuracy > 50) {
                        accuracyClass = 'accuracy-medium';
                        accuracyText = '一般';
                    }
                    if (accuracy > 100) {
                        accuracyClass = 'accuracy-poor';
                        accuracyText = '较差';
                    }
                    
                    // 显示结果
                    resultDiv.innerHTML = `
                        <div class="result-box">
                            <div class="result-item">
                                <span class="result-label">纬度:</span>
                                <span class="result-value">${latitude.toFixed(6)}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">经度:</span>
                                <span class="result-value">${longitude.toFixed(6)}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">精度:</span>
                                <span class="result-value ${accuracyClass}">${accuracy.toFixed(0)}米 (${accuracyText})</span>
                            </div>
                            ${altitude ? `
                            <div class="result-item">
                                <span class="result-label">海拔:</span>
                                <span class="result-value">${altitude.toFixed(1)}米</span>
                            </div>
                            ` : ''}
                            <div class="result-item">
                                <span class="result-label">时间:</span>
                                <span class="result-value">${timestamp}</span>
                            </div>
                            <a href="https://www.google.com/maps?q=${latitude},${longitude}" 
                               target="_blank" 
                               class="map-link">
                                🗺️ 在Google地图中查看
                            </a>
                            <a href="https://uri.amap.com/marker?position=${longitude},${latitude}" 
                               target="_blank" 
                               class="map-link" 
                               style="margin-left: 15px;">
                                📍 在高德地图中查看
                            </a>
                        </div>
                    `;
                    
                    showStatus('定位成功！', 'success');
                    
                    // 添加到历史
                    addToHistory({
                        lat: latitude,
                        lng: longitude,
                        accuracy: accuracy,
                        time: timestamp
                    });
                },
                (error) => {
                    let message = '定位失败：';
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            message += '用户拒绝了位置权限请求';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message += '位置信息不可用';
                            break;
                        case error.TIMEOUT:
                            message += '定位请求超时（可能GPS信号弱）';
                            break;
                        default:
                            message += '未知错误';
                    }
                    
                    showStatus(message, 'error');
                    console.error('定位错误:', error);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 20000,
                    maximumAge: 0
                }
            );
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status status-${type}`;
            statusDiv.innerHTML = message;
        }
        
        function addToHistory(record) {
            history.unshift(record);
            if (history.length > 10) {
                history.pop();
            }
            updateHistoryDisplay();
        }
        
        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');
            if (history.length === 0) {
                historyList.innerHTML = '<p style="color: #999; font-size: 0.85rem;">暂无历史记录</p>';
                return;
            }
            
            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item">
                    <div><strong>#${history.length - index}</strong> ${item.time}</div>
                    <div style="margin-top: 5px; color: #666;">
                        ${item.lat.toFixed(6)}, ${item.lng.toFixed(6)} 
                        (精度: ${item.accuracy.toFixed(0)}米)
                    </div>
                </div>
            `).join('');
        }
        
        function clearHistory() {
            history = [];
            updateHistoryDisplay();
            document.getElementById('result').innerHTML = '';
            showStatus('历史已清除', 'info');
        }
        
        // 初始化
        updateHistoryDisplay();
    </script>
</body>
</html>
